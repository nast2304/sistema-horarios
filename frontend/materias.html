<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Materias</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
        }

        .sidebar a:hover {
            background: #0d6efd;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .card {
            border-radius: 15px;
        }
    </style>

</head>

<body class="bg-light">

    <div id="menu"></div>

    <div class="main-content">

        <div class="card shadow p-4">

            <h2 class="mb-4">Registro de Materias</h2>

            <div class="row">

                <div class="col-md-4">

                    <input type="text" id="nombre" class="form-control" placeholder="Nombre Materia">

                </div>

                <div class="col-md-4">

                    <input type="number" id="horas" class="form-control" placeholder="Horas Semanales">

                </div>

                <div class="col-md-4">

                    <select id="semestre" class="form-select">

                        <option value="">Seleccionar semestre</option>

                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>

                    </select>

                </div>

            </div>

            <button class="btn btn-primary mt-3" onclick="guardarMateria()">

                Guardar

            </button>

        </div>

        <div class="card shadow mt-4 p-4">

            <h3>Lista de Materias</h3>

            <table class="table table-bordered mt-3">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Materia</th>
                        <th>Horas</th>
                        <th>Semestre</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaMaterias">

                </tbody>

            </table>

        </div>

    </div>

    <script>

        const API = "http://localhost:8080/materias";

        let idEditar = null;

        async function listarMaterias() {

            const respuesta = await fetch(API);

            const datos = await respuesta.json();

            let tabla = "";

            datos.forEach(materia => {

                tabla += `
            <tr>

                <td>${materia.id}</td>

                <td>${materia.nombre}</td>

                <td>${materia.horasSemanales}</td>

                <td>${materia.semestre}</td>

                <td>

                    <button class="btn btn-warning btn-sm"
                        onclick="cargarMateria(
                            ${materia.id},
                            '${materia.nombre}',
                            ${materia.horasSemanales},
                            ${materia.semestre}
                        )">

                        Editar

                    </button>

                    <button class="btn btn-danger btn-sm"
                        onclick="eliminarMateria(${materia.id})">

                        Eliminar

                    </button>

                </td>

            </tr>
        `;
            });

            document.getElementById("tablaMaterias").innerHTML = tabla;
        }

        async function guardarMateria() {

            const materia = {

                nombre: document.getElementById("nombre").value,

                horasSemanales:
                    document.getElementById("horas").value,

                semestre:
                    document.getElementById("semestre").value
            };

            // EDITAR
            if (idEditar != null) {

                await fetch(API + "/" + idEditar, {

                    method: "PUT",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(materia)
                });

                idEditar = null;

            } else {

                // GUARDAR
                await fetch(API, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(materia)
                });
            }

            limpiarFormulario();

            listarMaterias();
        }

        function cargarMateria(id, nombre, horas, semestre) {

            idEditar = id;

            document.getElementById("nombre").value = nombre;

            document.getElementById("horas").value = horas;

            document.getElementById("semestre").value = semestre;
        }

        async function eliminarMateria(id) {

            await fetch(API + "/" + id, {

                method: "DELETE"
            });

            listarMaterias();
        }

        function limpiarFormulario() {

            document.getElementById("nombre").value = "";

            document.getElementById("horas").value = "";

            document.getElementById("semestre").value = "";

        }

        listarMaterias();

    </script>
    <script>
        fetch("menu.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("menu").innerHTML = html;
            });
    </script>

</body>

</html>
