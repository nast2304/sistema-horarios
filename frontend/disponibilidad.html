<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Disponibilidad</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
        }

        .contenedor {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, .1);
        }

        td {
            text-align: center;
            cursor: pointer;
            height: 50px;
        }

        .seleccionado {
            background: #16c24a !important;
            color: white;
            font-weight: bold;
        }

        table {
            user-select: none;
        }

        body {
            background: #f5f6fa;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
        }

        .sidebar a:hover {
            background: #0d6efd;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .card {
            border-radius: 15px;
        }
    </style>

</head>

<body>
    <div id="menu"></div>

    <div class="main-content">

        <div class="contenedor">

            <h1 class="mb-4">
                Disponibilidad de Maestro
            </h1>

            <div class="row mb-4">

                <div class="col-md-4">

                    <label class="form-label">
                        Maestro
                    </label>

                    <select id="maestro" onchange="cargarDisponibilidadMaestro()" class="form-select">

                    </select>

                </div>

            </div>

            <h4 class="mb-3">
                Horario
            </h4>

            <table class="table table-bordered">

                <thead class="table-dark">

                    <tr>

                        <th>Horas</th>

                        <th>LUNES</th>
                        <th>MARTES</th>
                        <th>MIERCOLES</th>
                        <th>JUEVES</th>
                        <th>VIERNES</th>

                    </tr>

                </thead>

                <tbody id="tablaHorario">

                </tbody>

            </table>

            <button class="btn btn-primary w-100 mt-3" onclick="guardarDisponibilidad()">

                Guardar

            </button>

        </div>

    </div>

    <script>

        const API = "http://localhost:8080/disponibilidad";

        const dias = [
            "Lunes",
            "Martes",
            "Miercoles",
            "Jueves",
            "Viernes"
        ];

        const horas = [
            "07:00",
            "08:00",
            "09:00",
            "10:00",
            "11:00",
            "12:00",
            "13:00",
            "14:00",
            "15:00",
            "16:00",
            "17:00"
        ];

        let seleccionados = [];


        // CREAR TABLA
        function crearTabla() {

            let html = "";

            for (let i = 0; i < horas.length; i++) {

                let horaInicio = horas[i];

                let horaFin =
                    String(
                        parseInt(horas[i].split(":")[0]) + 1
                    ).padStart(2, '0') + ":00";

                html += `
            <tr>

                <td>
                    ${horaInicio} - ${horaFin}
                </td>
        `;

                dias.forEach(dia => {

                    html += `
                <td 
                    data-dia="${dia}"
                    data-inicio="${horaInicio}"
                    data-fin="${horaFin}"

                    onclick="
                    seleccionar(this,
                    '${dia}',
                    '${horaInicio}',
                    '${horaFin}')">

                </td>
            `;
                });

                html += "</tr>";
            }

            document.getElementById("tablaHorario")
                .innerHTML = html;
        }


        // SELECCIONAR CASILLA
        function seleccionar(celda, dia,
            horaInicio, horaFin) {

            celda.classList.toggle("seleccionado");

            const index = seleccionados.findIndex(h =>

                h.dia == dia &&
                h.horaInicio == horaInicio
            );

            if (index >= 0) {

                seleccionados.splice(index, 1);

            } else {

                seleccionados.push({

                    dia: dia,

                    horaInicio: horaInicio,

                    horaFin: horaFin
                });
            }
        }


        // CARGAR MAESTROS
        async function cargarMaestros() {

            const respuesta =
                await fetch("http://localhost:8080/maestros");

            const maestros = await respuesta.json();

            let opciones = "";

            maestros.forEach(m => {

                opciones += `
            <option value="${m.id}">
                ${m.nombre}
            </option>
        `;
            });

            document.getElementById("maestro")
                .innerHTML = opciones;
        }

        async function cargarDisponibilidadMaestro() {

            // LIMPIAR SELECCIÓN VISUAL
            document.querySelectorAll("#tablaHorario td")
                .forEach(td => {
                    td.classList.remove("seleccionado");
                });

            // LIMPIAR ARRAY
            seleccionados = [];

            const maestroId =
                document.getElementById("maestro").value;

            const respuesta =
                await fetch(API + "/maestro/" + maestroId);

            const horarios = await respuesta.json();

            horarios.forEach(horario => {

                const horaInicio =
                    horario.horaInicio.substring(0, 5);

                const horaFin =
                    horario.horaFin.substring(0, 5);

                // GUARDAR EN ARRAY
                seleccionados.push({

                    dia: horario.dia,

                    horaInicio: horaInicio,

                    horaFin: horaFin
                });

                // BUSCAR CELDAS
                const celda = document.querySelector(
                    `td[data-dia="${horario.dia}"][data-inicio="${horaInicio}"]`
                );

                if (celda) {

                    celda.classList.add("seleccionado");
                }
            });
        }

        // GUARDAR DISPONIBILIDAD
        async function guardarDisponibilidad() {

            const maestroId =
                document.getElementById("maestro").value;

            // ELIMINAR HORARIO ANTERIOR
            await fetch(
                API + "/maestro/" + maestroId,
                {
                    method: "DELETE"
                }
            );

            // GUARDAR NUEVO
            for (const horario of seleccionados) {

                const disponibilidad = {

                    dia: horario.dia,

                    horaInicio: horario.horaInicio,

                    horaFin: horario.horaFin,

                    maestro: {
                        id: maestroId
                    }
                };

                await fetch(API, {

                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify(disponibilidad)
                });
            }

            alert("Horario actualizado");
        }


        crearTabla();

        async function iniciar() {

            await cargarMaestros();

            cargarDisponibilidadMaestro();
        }

        iniciar();
    </script>

    <script>
        fetch("menu.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("menu").innerHTML = html;
            });
    </script>

</body>

</html>
