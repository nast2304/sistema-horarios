<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        Sistema de Horarios
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .card-menu {

            transition: .3s;
            cursor: pointer;

            border: none;
            border-radius: 20px;

            box-shadow: 0 5px 15px rgba(0, 0, 0, .1);
        }

        .card-menu:hover {

            transform: translateY(-8px);

            box-shadow: 0 10px 25px rgba(0, 0, 0, .2);
        }

        .icono {

            font-size: 60px;
            margin-bottom: 15px;
        }

        .titulo {

            font-weight: bold;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <span class="navbar-brand mb-0 h1">

                Sistema Generador de Horarios

            </span>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="text-center mb-5">

            <h1>

                Panel Principal

            </h1>

            <p class="text-muted">

                Selecciona un módulo

            </p>

        </div>

        <div class="row g-4">

            <div class="col-md-4">

                <a href="maestros.html" class="text-decoration-none">

                    <div class="card card-menu p-4 text-center">

                        <i class="fas fa-chalkboard-teacher icono text-primary"></i>

                        <h4 class="titulo">
                            Maestros
                        </h4>

                    </div>

                </a>

            </div>

            <div class="col-md-4">

                <a href="materias.html" class="text-decoration-none">

                    <div class="card card-menu p-4 text-center">

                        <i class="fas fa-book icono text-success"></i>

                        <h4 class="titulo">
                            Materias
                        </h4>

                    </div>

                </a>

            </div>

            <div class="col-md-4">

                <a href="grupo.html" class="text-decoration-none">

                    <div class="card card-menu p-4 text-center">

                        <i class="fas fa-users icono text-warning"></i>

                        <h4 class="titulo">
                            Grupos
                        </h4>

                    </div>

                </a>

            </div>

            <div class="col-md-4">

                <a href="disponibilidad.html" class="text-decoration-none">

                    <div class="card card-menu p-4 text-center">

                        <i class="fas fa-clock icono text-danger"></i>

                        <h4 class="titulo">
                            Disponibilidad
                        </h4>

                    </div>

                </a>

            </div>

            <div class="col-md-4">

                <a href="clase.html" class="text-decoration-none">

                    <div class="card card-menu p-4 text-center">

                        <i class="fas fa-layer-group icono text-info"></i>

                        <h4 class="titulo">
                            Clases Base
                        </h4>

                    </div>

                </a>

            </div>

            <div class="col-md-4">

                <a href="horarios.html" class="text-decoration-none">

                    <div class="card card-menu p-4 text-center">

                        <i class="fas fa-calendar-alt icono text-secondary"></i>

                        <h4 class="titulo">
                            Horarios
                        </h4>

                    </div>

                </a>

            </div>

        </div>

    </div>

</body>

</html>
