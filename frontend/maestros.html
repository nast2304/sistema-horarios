<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Maestros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
        }

        .card {
            border-radius: 15px;
        }

        body {
            background: #f5f6fa;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
        }

        .sidebar a:hover {
            background: #0d6efd;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body class="bg-light">

    <div id="menu"></div>

    <div class="main-content">

        <div class="card shadow p-4">

            <h2 class="mb-4">Registro de Maestros</h2>

            <div class="row">

                <div class="col-md-4">
                    <input type="text" id="nombre" class="form-control" placeholder="Nombre">
                </div>

                <div class="col-md-4">
                    <input type="email" id="correo" class="form-control" placeholder="Correo">
                </div>

                <div class="col-md-4">
                    <input type="password" id="password" class="form-control" placeholder="Contraseña">
                </div>

            </div>

            <button class="btn btn-primary mt-3" onclick="guardarMaestro()">
                Guardar
            </button>

        </div>

        <div class="card shadow mt-4 p-4">

            <h3>Lista de Maestros</h3>

            <table class="table table-bordered mt-3">

                <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Acciones</th>
                    </tr>

                </thead>

                <tbody id="tablaMaestros">

                </tbody>

            </table>

        </div>

    </div>

    <script>

        const API = "http://localhost:8080/maestros";

        let idEditar = null;

        async function listarMaestros() {

            const respuesta = await fetch(API);

            const datos = await respuesta.json();

            let tabla = "";

            datos.forEach(maestro => {

                tabla += `
            <tr>
                <td>${maestro.id}</td>
                <td>${maestro.nombre}</td>
                <td>${maestro.correo}</td>

                <td>

                    <button class="btn btn-warning btn-sm"
                            onclick="cargarMaestro(
                                ${maestro.id},
                                '${maestro.nombre}',
                                '${maestro.correo}',
                                '${maestro.password}'
                            )">

                        Editar

                    </button>

                    <button class="btn btn-danger btn-sm"
                            onclick="eliminarMaestro(${maestro.id})">

                        Eliminar

                    </button>

                </td>
            </tr>
        `;
            });

            document.getElementById("tablaMaestros").innerHTML = tabla;
        }

        async function guardarMaestro() {

            const maestro = {

                nombre: document.getElementById("nombre").value,

                correo: document.getElementById("correo").value,

                password: document.getElementById("password").value
            };

            // EDITAR
            if (idEditar != null) {

                await fetch(API + "/" + idEditar, {

                    method: "PUT",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(maestro)
                });

                idEditar = null;

            } else {

                // GUARDAR
                await fetch(API, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(maestro)
                });
            }

            limpiarFormulario();

            listarMaestros();
        }

        async function eliminarMaestro(id) {

            await fetch(API + "/" + id, {

                method: "DELETE"
            });

            listarMaestros();
        }

        function cargarMaestro(id, nombre, correo, password) {

            idEditar = id;

            document.getElementById("nombre").value = nombre;

            document.getElementById("correo").value = correo;

            document.getElementById("password").value = password;
        }

        function limpiarFormulario() {

            document.getElementById("nombre").value = "";

            document.getElementById("correo").value = "";

            document.getElementById("password").value = "";
        }

        listarMaestros();

    </script>
    <script>
        fetch("menu.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("menu").innerHTML = html;
            });
    </script>

</body>

</html>
