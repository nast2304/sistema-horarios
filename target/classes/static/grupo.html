<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Grupos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
        }

        .sidebar a:hover {
            background: #0d6efd;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .card {
            border-radius: 15px;
        }
    </style>

</head>

<body class="bg-light">

    <div id="menu"></div>

    <div class="main-content">

        <div class="card p-4 shadow">

            <h2 class="mb-4">
                CRUD Grupos
            </h2>

            <input type="hidden" id="id">

            <div class="mb-3">

                <label class="form-label">
                    Nombre del Grupo
                </label>

                <input type="text" id="nombre" class="form-control" placeholder="Nombre Materia">

            </div>

            <button class="btn btn-primary" onclick="guardarGrupo()">

                Guardar

            </button>

        </div>

        <div class="card p-4 shadow mt-4">

            <table class="table table-bordered">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tabla">

                </tbody>

            </table>

        </div>

    </div>

    <script>

        const API =
            "http://localhost:8080/grupos";


        // LISTAR
        async function listarGrupos() {

            const respuesta =
                await fetch(API);

            const grupos =
                await respuesta.json();

            let html = "";

            grupos.forEach(g => {

                html += `
            <tr>

                <td>${g.id}</td>

                <td>${g.nombre}</td>

                <td>

                    <button
                        class="btn btn-warning btn-sm"
                        onclick="editarGrupo(
                            ${g.id},
                            '${g.nombre}'
                        )">

                        Editar

                    </button>

                    <button
                        class="btn btn-danger btn-sm"
                        onclick="eliminarGrupo(
                            ${g.id}
                        )">

                        Eliminar

                    </button>

                </td>

            </tr>
        `;
            });

            document.getElementById("tabla")
                .innerHTML = html;
        }


        // GUARDAR
        async function guardarGrupo() {

            const id =
                document.getElementById("id").value;

            const grupo = {

                nombre:
                    document.getElementById("nombre").value
            };

            if (id == "") {

                await fetch(API, {

                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify(grupo)
                });

            } else {

                await fetch(API + "/" + id, {

                    method: "PUT",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify(grupo)
                });
            }

            limpiar();

            listarGrupos();
        }


        // EDITAR
        function editarGrupo(id, nombre) {

            document.getElementById("id").value = id;

            document.getElementById("nombre").value =
                nombre;
        }


        // ELIMINAR
        async function eliminarGrupo(id) {

            await fetch(API + "/" + id, {

                method: "DELETE"
            });

            listarGrupos();
        }


        // LIMPIAR
        function limpiar() {

            document.getElementById("id").value = "";

            document.getElementById("nombre").value = "";
        }


        listarGrupos();

    </script>

    <script>
        fetch("menu.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("menu").innerHTML = html;
            });
    </script>

</body>

</html>
