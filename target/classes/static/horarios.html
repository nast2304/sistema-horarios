<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Horarios Generados
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .horario-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, .1);
        }

        td {
            height: 100px;
            vertical-align: top;
        }

        .materia {
            background: #0d6efd;
            color: white;
            border-radius: 10px;
            padding: 5px;
            font-size: 14px;
        }

        .materia {
            color: white;
            border-radius: 10px;
            padding: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        body {
            background: #f5f6fa;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
        }

        .sidebar a:hover {
            background: #0d6efd;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .card {
            border-radius: 15px;
        }
    </style>

</head>

<body>

    <div id="menu"></div>

    <div class="main-content">

        <div class="d-flex justify-content-between mb-4">

            <h1>
                Horarios Escolares
            </h1>

            <button class="btn btn-success" onclick="generarHorario()">

                Generar Horarios
            </button>

        </div>

        <div id="contenedorHorarios">

        </div>

    </div>

    <script>

        async function generarHorario() {

            await fetch(
                "http://localhost:8080/horario/generar",
                {
                    method: "POST"
                }
            );

            cargarHorarios();
        }


        async function cargarHorarios() {

            const resGrupos =
                await fetch(
                    "http://localhost:8080/grupos"
                );

            const grupos =
                await resGrupos.json();

            const resClases =
                await fetch(
                    "http://localhost:8080/clases"
                );

            const clases =
                await resClases.json();

            const horas = [
                "07:00",
                "08:00",
                "09:00",
                "10:00",
                "11:00",
                "12:00",
                "13:00",
                "14:00",
                "15:00",
                "16:00",
                "17:00"
            ];

            const dias = [
                "Lunes",
                "Martes",
                "Miercoles",
                "Jueves",
                "Viernes"
            ];

            let html = "";

            const coloresMateria = {};

            const paleta = [
                "#0d6efd", // Azul
                "#198754", // Verde
                "#dc3545", // Rojo
                "#fd7e14", // Naranja
                "#6f42c1", // Morado
                "#20c997", // Turquesa
                "#d63384", // Rosa
                "#6610f2", // Violeta
                "#795548", // Café
                "#009688", // Verde azulado
                "#ffc107", // Amarillo
                "#343a40"  // Gris oscuro
            ];

            let indiceColor = 0;

            clases.forEach(c => {

                const nombre = c.materia.nombre;

                if (!coloresMateria[nombre]) {

                    coloresMateria[nombre] =
                        paleta[indiceColor % paleta.length];

                    indiceColor++;
                }
            });

            grupos.forEach(grupo => {

                html += `

            <div class="horario-card">

                <h3 class="mb-4">
                    Grupo:
                    ${grupo.nombre}
                </h3>

                <table class="table table-bordered">

                    <thead class="table-dark">

                        <tr>

                            <th>Hora</th>

                            <th>Lunes</th>
                            <th>Martes</th>
                            <th>Miercoles</th>
                            <th>Jueves</th>
                            <th>Viernes</th>

                        </tr>

                    </thead>

                    <tbody>
        `;

                horas.forEach(hora => {

                    html += "<tr>";

                    html += `
                <td>
                    ${hora}
                </td>
            `;

                    dias.forEach(dia => {

                        let contenido = "";

                        clases.forEach(c => {

                            if (
                                c.grupo.id == grupo.id &&
                                c.dia == dia &&
                                c.horaInicio.startsWith(hora)
                            ) {

                                contenido = `

                            <div
                                class="materia"
                                style="
                                    background:${coloresMateria[c.materia.nombre]};
                                "
                            >

                                <b>
                                    ${c.materia.nombre}
                                </b>

                                <hr style="margin:4px 0;">

                                Maestro:
                                ${c.maestro.nombre}

                                <br>

                                Aula:
                                ${c.aula}

                            </div>
                        `;
                            }
                        });

                        html += `
                    <td>
                        ${contenido}
                    </td>
                `;
                    });

                    html += "</tr>";
                });

                html += `
                    </tbody>

                </table>

            </div>
        `;
            });

            document.getElementById(
                "contenedorHorarios"
            ).innerHTML = html;
        }

        cargarHorarios();

    </script>

    <script>
        fetch("menu.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("menu").innerHTML = html;
            });
    </script>

</body>

</html>
