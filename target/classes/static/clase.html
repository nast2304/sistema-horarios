<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Clases
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
        }

        .card {
            border-radius: 15px;
        }

        body {
            background: #f5f6fa;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
        }

        .sidebar a:hover {
            background: #0d6efd;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .card {
            border-radius: 15px;
        }
    </style>

</head>

<body>

    <div id="menu"></div>

    <div class="main-content">

        <!-- FORMULARIO -->
        <div class="card shadow p-4">

            <h2 class="mb-4">
                Registro de Clases
            </h2>

            <input type="hidden" id="id">

            <div class="row">

                <!-- MAESTRO -->
                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Maestro
                    </label>

                    <select id="maestro" class="form-select">

                    </select>

                </div>

                <!-- MATERIA -->
                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Materia
                    </label>

                    <select id="materia" class="form-select">

                    </select>

                </div>

                <!-- GRUPO -->
                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Grupo
                    </label>

                    <select id="grupo" class="form-select">

                    </select>

                </div>

            </div>

            <!-- BOTON -->
            <button class="btn btn-primary" onclick="guardarClase()">

                Guardar Clase

            </button>

        </div>

        <!-- TABLA -->
        <div class="card shadow p-4 mt-4">

            <h3 class="mb-3">
                Clases Registradas
            </h3>

            <table class="table table-bordered">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Maestro</th>
                        <th>Materia</th>
                        <th>Grupo</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tabla">

                </tbody>

            </table>

        </div>

    </div>

    <script>

        const API =
            "http://localhost:8080/clases_base";


        // CARGAR MAESTROS
        async function cargarMaestros() {

            const res =
                await fetch(
                    "http://localhost:8080/maestros"
                );

            const datos =
                await res.json();

            let html = "";

            datos.forEach(m => {

                html += `
            <option value="${m.id}">
                ${m.nombre}
            </option>
        `;
            });

            document.getElementById("maestro")
                .innerHTML = html;
        }


        // CARGAR MATERIAS
        async function cargarMaterias() {

            const res =
                await fetch(
                    "http://localhost:8080/materias"
                );

            const datos =
                await res.json();

            let html = "";

            datos.forEach(m => {

                html += `
            <option value="${m.id}">
                ${m.nombre}
            </option>
        `;
            });

            document.getElementById("materia")
                .innerHTML = html;
        }


        // CARGAR GRUPOS
        async function cargarGrupos() {

            const res =
                await fetch(
                    "http://localhost:8080/grupos"
                );

            const datos =
                await res.json();

            let html = "";

            datos.forEach(g => {

                html += `
            <option value="${g.id}">
                ${g.nombre}
            </option>
        `;
            });

            document.getElementById("grupo")
                .innerHTML = html;
        }


        // LISTAR CLASES
        async function listarClases() {

            const res =
                await fetch(API);

            const clases =
                await res.json();

            let html = "";

            clases.forEach(c => {

                html += `
            <tr>

                <td>${c.id}</td>

                <td>
                    ${c.maestro.nombre}
                </td>

                <td>
                    ${c.materia.nombre}
                </td>

                <td>
                    ${c.grupo.nombre}
                </td>

                <td>

                    <button
                        class="btn btn-danger btn-sm"
                        onclick="eliminarClase(${c.id})">

                        Eliminar

                    </button>

                </td>

            </tr>
        `;
            });

            document.getElementById("tabla")
                .innerHTML = html;
        }


        // GUARDAR
        async function guardarClase() {

            const clase = {

                maestro: {
                    id:
                        document.getElementById("maestro").value
                },

                materia: {
                    id:
                        document.getElementById("materia").value
                },

                grupo: {
                    id:
                        document.getElementById("grupo").value
                }
            };

            const existe = await fetch(
                API +
                "/existe/" +
                document.getElementById("maestro").value +
                "/" +
                document.getElementById("materia").value +
                "/" +
                document.getElementById("grupo").value
            );

            const resultado = await existe.json();

            if (resultado) {

                alert("Esta clase ya existe");

                return;
            }

            await fetch(API, {

                method: "POST",

                headers: {
                    "Content-Type":
                        "application/json"
                },

                body: JSON.stringify(clase)
            });

            listarClases();

            alert("Clase registrada");
        }


        // ELIMINAR
        async function eliminarClase(id) {

            await fetch(API + "/" + id, {

                method: "DELETE"
            });

            listarClases();
        }


        // INICIO
        cargarMaestros();

        cargarMaterias();

        cargarGrupos();

        listarClases();

    </script>

    <script>
        fetch("menu.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("menu").innerHTML = html;
            });
    </script>

</body>

</html>
